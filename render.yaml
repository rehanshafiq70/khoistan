services:
  # ── Flask Backend ────────────────────────────────────────────────
  - type: web
    name: khoistan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: khoistan-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

  # ── React Frontend (Static Site) ─────────────────────────────────
  - type: web
    name: khoistan-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - key: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        fromService:
          name: khoistan-backend
          property: url

  # ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: khoistan-db
    databaseName: khoistan
    user: khoistan_user
    plan: free
